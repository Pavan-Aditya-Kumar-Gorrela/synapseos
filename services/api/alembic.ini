# alembic.ini
#
# PURPOSE:
#   Alembic's configuration file. The `alembic` CLI reads this file.
#   The DATABASE_URL is overridden in alembic/env.py using our Settings,
#   so the sqlalchemy.url here is just a placeholder.

[alembic]
# Path to migration scripts
script_location = alembic

# Filename template for new migrations
file_template = %%(rev)s_%%(slug)s

# Timezone for revision file timestamps
timezone = UTC

# Maximum length of slug in revision filename
truncate_slug_length = 40

# The URL is overridden in env.py — this is just a placeholder
sqlalchemy.url = postgresql+asyncpg://user:pass@localhost/dbname

[post_write_hooks]
# Optionally run black formatter on new migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
